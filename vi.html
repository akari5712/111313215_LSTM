<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .conveyor { width: 800px; height: 10px; background: #333; position: relative; margin-top: 100px; }
        .cell-state {
  width: 40px;
  height: 40px;
  background: #ffcc00;
  border-radius: 50%;
  position: absolute;
  
  /* --- 核心修正：用 top 和 margin 完美垂直置中 --- */
  top: 50%;
  margin-top: -20px; /* 數值是球高度 (40px) 的一半，強迫它向下修正 */
  left: -50px;
  
  /* 這裡不需要寫任何 transform 囉！ */
  transform-origin: center;
  /* ------------------------------------------- */
  
  box-shadow: 0 0 15px rgba(255,204,0,0.8);
  transition: all 1s linear;
}
        .gate { position: absolute; top: -80px; text-align: center; font-weight: bold; font-size: 14px; }
        .gate span { display: block; padding: 5px; border-radius: 5px; color: white; }
        .forget { left: 200px; } .forget span { background: #ff4d4d; }
        .input { left: 400px; } .input span { background: #4caf50; }
        .output { left: 600px; } .output span { background: #2196f3; }
        .msg { margin-top: 50px; font-style: italic; color: #666; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #333; color: white; }
    </style>
</head>
<body>

    <h2>LSTM 視覺化傳送帶 (依據你的草圖製作)</h2>
    <button onclick="startFlow()">執行一次(處理目前數據)</button>

    <div class="conveyor">
        <!-- 三個閘門站 -->
        <div class="gate forget"><span>Forget Gate<br>「斷捨離」</span><div id="f-arrow">↓</div></div>
        <div class="gate input"><span>Input Gate<br>「記重點」</span><div id="i-arrow">↓</div></div>
        <div class="gate output"><span>Output Gate<br>「交作業」</span><div id="o-arrow">↓</div></div>
        
        <!-- 你的 History 線上的資訊金球 -->
        <div id="ball" class="cell-state"></div>
    </div>

    <div id="status" class="msg">準備就緒，點擊按鈕觀察 History 線的變化...</div>

    <script>
function startFlow() {
    const ball = document.getElementById('ball');
    const status = document.getElementById('status');
    
    // 重置 (因為有 margin-top，這邊只要處理 X 軸起點與大小)
    ball.style.left = '-20px'; // 讓球的中心點剛好在傳送帶最左端起點 (0 - 20px)
    ball.style.transform = 'scale(1)';
    ball.style.opacity = '1';
    
    setTimeout(() => {
        // 1. 移動到 Forget Gate (原本 200px 改為 180px，因為要減去球半徑 20px 才能精準對齊閘門中心)
        ball.style.left = '180px';
        ball.style.transform = 'scale(0.7)';
        status.innerText = "Step 1: Forget Gate - 判斷哪些舊資訊該丟掉...";
    }, 500);
    
    setTimeout(() => {
        // 模擬忘記：球變小一點
        ball.style.transform = 'scale(0.7)';
    }, 1500);
    
    setTimeout(() => {
        // 2. 移動到 Input Gate (400px - 20px = 380px)
        ball.style.left = '380px';
        ball.style.transform = 'scale(1.3)';
        status.innerText = "Step 2: Input Gate - 將當前有用的新資訊存入 History...";
    }, 2500);
    
    setTimeout(() => {
        // 模擬存入：球變大且發光
        ball.style.transform = 'scale(1.3)';
        ball.style.boxShadow = '0 0 30px rgba(255,204,0,1)';
    }, 3500);
    
    setTimeout(() => {
        // 3. 移動到 Output Gate (600px - 20px = 580px)
        ball.style.left = '580px';
        ball.style.transform = 'scale(1)';
        status.innerText = "Step 3: Output Gate - 結合記憶與現況，產出結果 (Output)...";
    }, 4500);
    
    setTimeout(() => {
        // 4. 流向下一站
        ball.style.left = '820px';
        ball.style.transform = 'scale(1)';
        status.innerText = "處理完成！更新後的 History 繼續傳遞給下一站。";
    }, 6000);
}
    </script>
</body>
</html>
