<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #f0f2f5;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

.conveyor {
  width: 800px;
  height: 10px;
  background: #333;
  position: relative;
  margin-top: 100px;
}

/* 1. 修正閘門置中，並合併成單一個設定，避免重複覆蓋 */
.gate {
  position: absolute;
  top: -80px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  transform: translateX(-50%); /* 讓閘門正中心對準 left 的設定值 */
}

.gate span {
  display: block;
  padding: 5px;
  border-radius: 5px;
  color: white;
  white-space: nowrap; /* 避免文字換行影響寬度計算 */
}

.forget { left: 200px; }
.forget span { background: #ff4d4d; }

.input { left: 400px; }
.input span { background: #4caf50; }

.output { left: 600px; }
.output span { background: #2196f3; }

.msg {
  margin-top: 50px;
  font-style: italic;
  color: #666;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
}

/* 2. 補上漏掉的資訊金球 CSS 樣式 */
.cell-state {
  width: 40px;
  height: 40px;
  background: #ffcc00;
  border-radius: 50%;
  position: absolute;
  
  /* 用 top 與 margin-top 完美卡死在傳送帶的垂直中心線上 */
  top: 50%;
  margin-top: -20px; 
  left: 0px;
  
  /* 讓球的左右基準點也在正中心，這樣配合 JS 的 left 就會絕對精準 */
  transform: translateX(-50%);
  transform-origin: center;
  
  box-shadow: 0 0 15px rgba(255,204,0,0.8);
  transition: all 1s linear;
}
</style>
</head>
<body>

<h2>LSTM 視覺化傳送帶 (依據你的草圖製作)</h2>
<button onclick="startFlow()">執行一次(處理目前數據)</button>

<div class="conveyor">
  <div class="gate forget"><span>Forget Gate<br>「斷捨離」</span><div id="f-arrow">↓</div></div>
  <div class="gate input"><span>Input Gate<br>「記重點」</span><div id="i-arrow">↓</div></div>
  <div class="gate output"><span>Output Gate<br>「交作業」</span><div id="o-arrow">↓</div></div>
  
  <div id="ball" class="cell-state"></div>
</div>

<div id="status" class="msg">準備就緒，點擊按鈕觀察 History 線的變化...</div>

<script>
function startFlow() {
    const ball = document.getElementById('ball');
    const status = document.getElementById('status');
    
    // 【核心修正】瞬間跳回最左邊起點：先拔掉動畫，定格到 0px
    ball.style.transition = 'none'; 
    ball.style.left = '0px';
    ball.style.transform = 'translateX(-50%) scale(1)';
    ball.style.opacity = '1';
    ball.style.boxShadow = '0 0 15px rgba(255,204,0,0.8)';
    
    // 強制瀏覽器重繪（Reflow），確保「無動畫跳回」立刻生效
    ball.offsetHeight; 
    
    // 把 1 秒的滑動動畫加回來，準備出發
    ball.style.transition = 'all 1s linear';

    setTimeout(() => {
        // 1. 移動到 Forget Gate
        ball.style.left = '200px';
        ball.style.transform = 'translateX(-50%) scale(0.7)';
        status.innerText = "Step 1: Forget Gate - 判斷哪些舊資訊該丟掉...";
    }, 500);
    
    setTimeout(() => {
        ball.style.transform = 'translateX(-50%) scale(0.7)';
    }, 1500);
    
    setTimeout(() => {
        // 2. 移動到 Input Gate
        ball.style.left = '400px';
        ball.style.transform = 'translateX(-50%) scale(1.3)';
        status.innerText = "Step 2: Input Gate - 將當前有用的新資訊存入 History...";
    }, 2500);
    
    setTimeout(() => {
        ball.style.transform = 'translateX(-50%) scale(1.3)';
        ball.style.boxShadow = '0 0 30px rgba(255,204,0,1)';
    }, 3500);
    
    setTimeout(() => {
        // 3. 移動到 Output Gate
        ball.style.left = '600px';
        ball.style.transform = 'translateX(-50%) scale(1)';
        status.innerText = "Step 3: Output Gate - 結合記憶與現況，產出結果 (Output)...";
    }, 4500);
    
    setTimeout(() => {
        // 4. 流向下一站
        ball.style.left = '800px';
        ball.style.transform = 'translateX(-50%) scale(1)';
        status.innerText = "處理完成！更新後的 History 繼續傳遞給下一站。";
    }, 6000);
}
</script>

</body>
</html>
